<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Hunter Body"/>
<meta name="theme-color" content="#07070e"/>
<base href="/gym/"/>
  <link rel="manifest" href="/gym/manifest.json"/>
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/dumbbell.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
<title>Hunter Body Protocol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#07070e;color:#fff;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#07070e;}::-webkit-scrollbar-thumb{background:#ffffff22;border-radius:2px;}
.orb{font-family:'Orbitron',monospace;}
button{font-family:'Rajdhani',sans-serif;border:none;cursor:pointer;transition:opacity .15s,transform .1s;}
button:active{opacity:.75;transform:scale(.97);}
input{font-family:'Rajdhani',sans-serif;color:#fff;outline:none;}
textarea{font-family:'Rajdhani',sans-serif;color:#fff;outline:none;resize:none;}
#app{max-width:480px;margin:0 auto;padding:16px 13px 70px;position:relative;z-index:1;}
/* Particles */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.pt{position:absolute;border-radius:50%;opacity:.1;}
/* Scanline */
#scan{position:fixed;top:0;left:0;right:0;height:2px;z-index:999;pointer-events:none;animation:scan 8s linear infinite;}
@keyframes scan{0%{transform:translateY(-2px)}100%{transform:translateY(100vh)}}
@keyframes pulse{0%,100%{box-shadow:0 0 12px var(--rg)}50%{box-shadow:0 0 32px var(--rg),0 0 55px var(--rg)}}
@keyframes fp{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-18px) scale(1.3)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .25s ease forwards;}
/* Layout */
.card{background:linear-gradient(135deg,#0e0e1a,#0a0a12);border:1px solid #ffffff0d;border-radius:12px;padding:14px;margin-bottom:10px;}
.card-lbl{font-family:'Orbitron',monospace;font-size:9px;color:#ffffff33;letter-spacing:3px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.stat-card{background:linear-gradient(135deg,#0e0e1a,#0a0a12);border:1px solid #ffffff0d;border-radius:12px;padding:12px 13px;}
.stat-lbl{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;margin-bottom:4px;}
.stat-val{font-family:'Orbitron',monospace;font-size:21px;font-weight:900;color:#fff;}
.stat-sub{font-size:11px;color:#ffffff44;margin-top:2px;}
/* Progress bar */
.prog-track{height:5px;background:#ffffff0a;border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;transition:width .7s ease;}
/* Tabs */
#tabs{display:flex;gap:5px;margin-bottom:13px;}
.tab-btn{flex:1;padding:7px 2px;border-radius:8px;border:1px solid #ffffff15;background:#ffffff06;color:#ffffff44;font-size:10px;font-weight:700;letter-spacing:.5px;line-height:1.3;}
.tab-btn.active{border-color:var(--rc);color:var(--rc);background:rgba(var(--rc-raw),.1);}
/* Header */
#header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:13px 16px;background:linear-gradient(135deg,#0e0e1a,#111118);border-radius:14px;border:1px solid #ffffff0d;}
.rank-badge{width:62px;height:62px;border-radius:13px;border:2px solid var(--rc);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#07070e;animation:pulse 3s infinite;}
.rank-val{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--rc);}
/* Buttons */
.sm-btn{padding:4px 10px;border-radius:5px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;}
.act-btn{width:100%;padding:12px;border-radius:11px;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;text-align:center;}
/* Exercise row */
.ex-row{border-radius:8px;overflow:hidden;margin-bottom:7px;}
.ex-head{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;}
.ex-check{width:22px;height:22px;border-radius:5px;border:2px solid #ffffff2a;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .2s;}
.set-badge{padding:3px 7px;border-radius:4px;font-family:'Orbitron',monospace;font-size:9px;display:inline-block;margin:2px;}
/* Day buttons */
.day-btn{padding:5px 9px;border-radius:6px;border:1px solid #ffffff1a;background:#ffffff08;color:#ffffff44;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.day-btn.active{color:var(--dc);background:rgba(var(--dc-raw),.13);border-color:var(--dc);}
/* Meal row */
.meal-row{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:8px;cursor:pointer;margin-bottom:6px;transition:background .15s;}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:1000;align-items:center;justify-content:center;padding:18px;}
#modal-overlay.show{display:flex;}
#modal-box{background:#0e0e1a;border:1px solid var(--rc);border-radius:16px;padding:22px;width:100%;max-width:340px;box-shadow:0 0 40px var(--rg);max-height:88vh;overflow-y:auto;}
.modal-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--rc);margin-bottom:3px;}
.modal-sub{font-size:11px;color:#ffffff44;margin-bottom:15px;}
.m-input{width:100%;background:#ffffff08;border:1px solid var(--rc);border-opacity:.3;border-color:rgba(var(--rc-raw),.25);border-radius:8px;padding:11px 13px;font-size:15px;color:#fff;display:block;margin-bottom:7px;}
.m-btns{display:flex;gap:8px;margin-top:5px;}
.m-cancel{flex:1;padding:11px;border-radius:8px;border:1px solid #ffffff1a;background:transparent;color:#ffffff55;font-size:13px;}
.m-ok{flex:1;padding:11px;border-radius:8px;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:1px;border:1px solid var(--rc);background:rgba(var(--rc-raw),.15);color:var(--rc);}
/* Timer */
#timer-bar{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:500;background:#0e0e1a;border:2px solid var(--rc);border-radius:14px;padding:12px 20px;align-items:center;gap:14px;box-shadow:0 0 30px var(--rg);}
#timer-bar.show{display:flex;}
#timer-val{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:var(--rc);}
/* Bottom nav placeholder */
.section{display:none;}.section.active{display:block;}
/* Rank bars */
.rank-bar{flex:1;text-align:center;padding:3px 0;border-radius:4px;font-family:'Orbitron',monospace;font-size:10px;}
/* History chart */
.chart-bar{border-radius:2px 2px 0 0;margin-top:auto;}
/* Notif banner */
.notif-ok{background:#00ff8815;border:1px solid #00ff8844;color:#00ff88;}
.notif-off{background:#ffffff08;border:1px solid #ffffff11;color:#ffffff44;}
</style>
</head>
<body>
<div id="particles"></div>
<div id="scan"></div>
<div id="app"></div>

<!-- Timer bar -->
<div id="timer-bar">
  <div>
    <div class="orb" style="font-size:9px;color:var(--rc);letter-spacing:2px;" id="timer-exname">REPOS</div>
    <div id="timer-val">0:00</div>
  </div>
  <button class="sm-btn" style="background:transparent;border:1px solid var(--rc);color:var(--rc);" onclick="skipTimer()">SKIP</button>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = "hunter_body_v3";
const START_DATE  = "2026-06-08";
const KG_TO_LBS   = 2.20462;
const DELOAD_EVERY= 6;

const PROGRAM = {
  Lundi:    {label:"PUSH",         color:"#ff4444",craw:"255,68,68",   icon:"🔥", exercises:[
    {name:"Développé couché",           sets:4,reps:"6-10",       rest:150,rl:"2-3 min"},
    {name:"Développé incliné haltères", sets:3,reps:"8-12",       rest:105,rl:"90-120 sec"},
    {name:"Dips",                       sets:3,reps:"8-12 ou max",rest:90, rl:"90 sec"},
    {name:"Élévations latérales",       sets:4,reps:"12-20",      rest:60, rl:"60 sec"},
    {name:"Triceps pushdown",           sets:3,reps:"10-15",      rest:68, rl:"60-75 sec"},
    {name:"Extension triceps au-dessus",sets:2,reps:"10-15",      rest:68, rl:"60-75 sec"},
  ]},
  Mardi:    {label:"PULL",         color:"#4488ff",craw:"68,136,255",  icon:"⚡", exercises:[
    {name:"Tractions / tirage vertical",sets:4,reps:"6-10", rest:120,rl:"2 min"},
    {name:"Rowing barre ou machine",    sets:4,reps:"8-12", rest:105,rl:"90-120 sec"},
    {name:"Tirage horizontal",          sets:3,reps:"10-12",rest:90, rl:"90 sec"},
    {name:"Face pull",                  sets:3,reps:"12-20",rest:60, rl:"60 sec"},
    {name:"Curl biceps barre",          sets:3,reps:"8-12", rest:68, rl:"60-75 sec"},
    {name:"Curl incliné ou marteau",    sets:2,reps:"10-12",rest:68, rl:"60-75 sec"},
  ]},
  Mercredi: {label:"REPOS",        color:"#555",   craw:"85,85,85",    icon:"💤", exercises:[]},
  Jeudi:    {label:"LEGS",         color:"#aa44ff",craw:"170,68,255",  icon:"💪", exercises:[
    {name:"Squat",            sets:4,reps:"6-10", rest:150,rl:"2-3 min"},
    {name:"Leg press",        sets:3,reps:"10-15",rest:90, rl:"90 sec"},
    {name:"Romanian deadlift",sets:3,reps:"8-12", rest:105,rl:"90-120 sec"},
    {name:"Leg curl",         sets:3,reps:"10-15",rest:68, rl:"60-75 sec"},
    {name:"Mollets",          sets:4,reps:"12-20",rest:53, rl:"45-60 sec"},
    {name:"Abdos",            sets:3,reps:"12-20",rest:53, rl:"45-60 sec"},
  ]},
  Vendredi: {label:"HAUT DU CORPS",color:"#ffaa00",craw:"255,170,0",   icon:"⚔️", exercises:[
    {name:"Développé incliné",          sets:3,reps:"8-12", rest:105,rl:"90-120 sec"},
    {name:"Tractions / tirage vertical",sets:3,reps:"8-12", rest:90, rl:"90 sec"},
    {name:"Rowing",                     sets:3,reps:"8-12", rest:90, rl:"90 sec"},
    {name:"Élévations latérales",       sets:4,reps:"12-20",rest:60, rl:"60 sec"},
    {name:"Curl biceps",                sets:3,reps:"10-12",rest:60, rl:"60 sec"},
    {name:"Triceps pushdown",           sets:3,reps:"10-12",rest:60, rl:"60 sec"},
  ]},
  Samedi:   {label:"CARDIO LÉGER", color:"#00ccaa",craw:"0,204,170",   icon:"🏃", cardio:true, exercises:[
    {name:"Marche rapide / jogging",sets:1,reps:"20-30 min",rest:0,rl:"—"},
    {name:"Vélo ou elliptique",     sets:1,reps:"15-20 min",rest:0,rl:"—"},
    {name:"Abdos",                  sets:3,reps:"15-20",    rest:45,rl:"45 sec"},
    {name:"Étirements / mobilité",  sets:1,reps:"10-15 min",rest:0,rl:"—"},
  ]},
  Dimanche: {label:"REPOS",        color:"#555",   craw:"85,85,85",    icon:"💤", exercises:[]},
};

const DAYS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const MEALS = [
  {id:"pre",   label:"Pré-workout",  icon:"🍌",kcal:200, hour:7},
  {id:"post",  label:"Post-workout", icon:"🥛",kcal:900, hour:9},
  {id:"lunch", label:"Déjeuner",     icon:"🍚",kcal:600, hour:12},
  {id:"snack", label:"Collation",    icon:"🥜",kcal:300, hour:16},
  {id:"dinner",label:"Dîner",        icon:"🍖",kcal:700, hour:20},
  {id:"sleep", label:"Avant-sommeil",icon:"🥛",kcal:200, hour:22},
];

const ALL_EX = [...new Set(Object.values(PROGRAM).flatMap(d=>d.exercises.map(e=>e.name)))];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const DEF = {
  unit:"kg",heightCm:178,currentWeight:57,targetWeight:67.5,
  weightHistory:[],sessions:{},sessionLogs:{},sessionNotes:{},
  meals:{},calorieLog:{},charges:{},measurements:{},measureHistory:[],
  notifEnabled:false
};

let S = (() => {
  try { const s=localStorage.getItem(STORAGE_KEY); return s?{...DEF,...JSON.parse(s)}:DEF; }
  catch { return DEF; }
})();

function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(S)); render(); }

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const toKg   = (v,u) => u==="lbs" ? v/KG_TO_LBS : v;
const toDisp = (kg,u)=> u==="lbs" ? +(kg*KG_TO_LBS).toFixed(1) : +kg.toFixed(1);
const uLbl   = u => u==="lbs"?"lbs":"kg";
const tKey   = ()=> new Date().toISOString().split("T")[0];
const todayName=()=>["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"][new Date().getDay()];
const calcBMI=(w,h)=>(w/((h/100)**2)).toFixed(1);
const calcTDEE=(w,h)=>Math.round((10*w+6.25*h-5*22+5)*1.55);
const wksLeft=(c,t)=>t<=c?0:Math.ceil((t-c)/0.3);
const daysToStart=()=>{const d=new Date(START_DATE)-new Date(tKey());return Math.max(0,Math.ceil(d/86400000));};
const beforeStart=()=>tKey()<START_DATE;

function getRank(w,t){
  const p=((w-57)/(t-57))*100;
  if(p>=100)return{r:"S",c:"#ffd700",cr:"255,215,0",   g:"#ffd70088"};
  if(p>=80) return{r:"A",c:"#ff4444",cr:"255,68,68",   g:"#ff444488"};
  if(p>=60) return{r:"B",c:"#aa44ff",cr:"170,68,255",  g:"#aa44ff88"};
  if(p>=40) return{r:"C",c:"#4488ff",cr:"68,136,255",  g:"#4488ff88"};
  if(p>=20) return{r:"D",c:"#00ccaa",cr:"0,204,170",   g:"#00ccaa88"};
  return          {r:"E",c:"#888",   cr:"136,136,136", g:"#88888866"};
}

function lastSet(ex){const h=S.charges[ex]; return h&&h.length?h[h.length-1]:null;}
function prSet(ex){const h=S.charges[ex]; return h&&h.length?h.reduce((m,e)=>e.weight>m.weight?e:m,h[0]):null;}
function todaySetsFor(ex){return((S.sessionLogs[tKey()]||{})[ex]||[]);}

function nextReco(ex,repRange){
  const sets=todaySetsFor(ex);
  const ref=sets.length?sets:(()=>{const h=S.charges[ex]||[];const last=h.slice(-1)[0]?.date;return last?h.filter(e=>e.date===last):[];})();
  if(!ref.length){const lc=lastSet(ex);return lc?{w:lc.weight,up:false,note:"Même charge"}:null;}
  const top=parseInt((repRange||"").split("-")[1])||10;
  const allTop=ref.every(s=>s.reps&&s.reps>=top);
  const avg=ref.reduce((s,e)=>s+e.weight,0)/ref.length;
  const inc=S.unit==="lbs"?toKg(5,"lbs"):2.5;
  return allTop?{w:avg+inc,up:true,note:`Top reps → +${S.unit==="lbs"?"5 lbs":"2.5 kg"} 🔥`}:{w:avg,up:false,note:"Consolide d'abord"};
}

// ═══════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════
let timerInterval=null, timerSecs=0;
function startTimer(ex,secs){
  clearInterval(timerInterval);
  timerSecs=secs;
  document.getElementById("timer-exname").textContent=ex;
  updateTimerDisplay();
  document.getElementById("timer-bar").classList.add("show");
  timerInterval=setInterval(()=>{
    timerSecs--;
    updateTimerDisplay();
    if(timerSecs<=0){
      clearInterval(timerInterval);
      document.getElementById("timer-bar").classList.remove("show");
      if(S.notifEnabled&&Notification.permission==="granted")
        new Notification("⏱ Repos terminé !",{body:"C'est reparti 💪"});
    }
  },1000);
}
function updateTimerDisplay(){
  const el=document.getElementById("timer-val");
  if(!el) return;
  el.textContent=`${Math.floor(timerSecs/60)}:${String(timerSecs%60).padStart(2,"0")}`;
  el.style.color=timerSecs<=10?"#ff4444":"var(--rc)";
}
function skipTimer(){ clearInterval(timerInterval); timerSecs=0; document.getElementById("timer-bar").classList.remove("show"); }

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
let currentModal=null;
function openModal(id){ currentModal=id; renderModal(); document.getElementById("modal-overlay").classList.add("show"); }
function closeModal(e){ if(!e||e.target===document.getElementById("modal-overlay")){document.getElementById("modal-overlay").classList.remove("show"); currentModal=null;} }

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════
let currentTab="dashboard";
let currentDay=todayName();
let histEx=null;

function setCSS(){
  const rk=getRank(S.currentWeight,S.targetWeight);
  document.documentElement.style.setProperty("--rc",rk.c);
  document.documentElement.style.setProperty("--rc-raw",rk.cr);
  document.documentElement.style.setProperty("--rg",rk.g);
  document.getElementById("scan").style.background=`linear-gradient(90deg,transparent,${rk.c}44,transparent)`;
}

function render(){
  setCSS();
  const app=document.getElementById("app");
  const rk=getRank(S.currentWeight,S.targetWeight);
  const u=S.unit;
  const today=todayName();
  const dk=tKey();
  const todayProg=PROGRAM[today];
  const myTdee=calcTDEE(S.currentWeight,S.heightCm);
  const targetCal=myTdee+400;
  const todayMeals=S.meals[dk]||{};
  const todayCal=S.calorieLog[dk]||0;
  const todaySess=S.sessions[dk]||{};
  const exDone=Object.values(todaySess).filter(Boolean).length;
  const totalEx=todayProg.exercises.length;
  const sessPct=totalEx>0?Math.round((exDone/totalEx)*100):0;
  const dayLog=S.sessionLogs[dk]||{};
  const totalVol=Object.values(dayLog).flat().reduce((s,e)=>s+e.weight*(e.reps||1),0);
  const totalSets=Object.values(dayLog).reduce((s,a)=>s+a.length,0);
  const mealsDone=Object.values(todayMeals).filter(Boolean).length;
  const calPct=Math.min(100,Math.round((todayCal/targetCal)*100));
  const progPct=Math.min(100,Math.max(0,((S.currentWeight-57)/(S.targetWeight-57))*100));
  const wl=wksLeft(S.currentWeight,S.targetWeight);
  const weekNum=Math.max(0,Math.floor((new Date()-new Date(START_DATE))/604800000)+1);
  const needsDeload=weekNum>0&&weekNum%DELOAD_EVERY===0;

  // Streak
  let streak=0;
  const sd=new Date();
  for(let i=0;i<42;i++){
    const k=sd.toISOString().split("T")[0];
    const dn=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"][sd.getDay()];
    const p=PROGRAM[dn];
    if(p.exercises.length===0){sd.setDate(sd.getDate()-1);continue;}
    const ss=S.sessions[k]||{};
    if(Object.values(ss).filter(Boolean).length>=p.exercises.length*0.5)streak++;
    else break;
    sd.setDate(sd.getDate()-1);
  }

  // HEADER
  const headerHTML=`
  <div id="header">
    <div>
      <div class="orb" style="font-size:9px;color:${rk.c};letter-spacing:4px;margin-bottom:3px;">HUNTER BODY PROTOCOL</div>
      <div class="orb" style="font-size:19px;font-weight:900;color:#fff;letter-spacing:2px;">JEREMIE</div>
      <div style="font-size:11px;color:#ffffff44;margin-top:2px;">${S.heightCm}cm · BMI ${calcBMI(S.currentWeight,S.heightCm)} · TDEE ~${myTdee} kcal</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div class="rank-badge"><div class="rank-val">${rk.r}</div><div style="font-size:8px;color:#ffffff44;letter-spacing:2px;">RANK</div></div>
      <div style="display:flex;gap:5px;">
        <button class="sm-btn" style="border:1px solid ${rk.c}55;background:rgba(${rk.cr},.1);color:${rk.c};" onclick="toggleUnit()">${u.toUpperCase()} ⇄</button>
        <button class="sm-btn" style="font-size:14px;padding:3px 8px;border:1px solid ${S.notifEnabled?"#00ff8855":"#ffffff22"};background:${S.notifEnabled?"#00ff8815":"#ffffff08"};color:${S.notifEnabled?"#00ff88":"#ffffff44"};" onclick="toggleNotif()">🔔</button>
      </div>
    </div>
  </div>`;

  // TABS
  const TABS=[["dashboard","⬡","DASH"],["today","⚔","SÉANCE"],["meals","🍖","REPAS"],["history","📋","HISTO"],["progress","📈","STATS"]];
  const tabsHTML=`<div id="tabs">${TABS.map(([id,ic,lb])=>`<button class="tab-btn${currentTab===id?" active":""}" onclick="switchTab('${id}')">${ic}<br>${lb}</button>`).join("")}</div>`;

  // ── DASHBOARD ──
  let dashHTML=`
  ${beforeStart()?`<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">

      ${wh.map((e,i,arr)=>{const mn=Math.min(...arr.map(x=>x.weight));const mx=Math.max(...arr.map(x=>x.weight));const rng=mx-mn||.5;const h=Math.max(7,((e.weight-mn)/rng)*60+7);const last=i===arr.length-1;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">${last?`<div class="orb" style="font-size:7px;color:${rk.c};">${toDisp(e.weight,u)}</div>`:""}<div class="chart-bar" style="width:100%;height:${h}px;background:${last?`linear-gradient(0deg,${rk.c}88,${rk.c})`:`rgba(${rk.cr},.2)`};"></div></div>`;}).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#ffffff22;">${wh[0]?.date?.slice(5)}<span>Aujourd'hui</span></div>`}
    <div style="display:flex;gap:8px;margin-top:11px;">
      ${[{l:"BMI",v:calcBMI(S.currentWeight,S.heightCm),s:parseFloat(calcBMI(S.currentWeight,S.heightCm))<18.5?"Sous-poids":"Normal"},{l:"TDEE",v:myTdee,s:"kcal maintien"},{l:"SURPLUS",v:"+400",s:"kcal cible"}].map(s=>`<div style="flex:1;background:#ffffff08;border-radius:8px;padding:8px 9px;"><div class="orb" style="font-size:8px;color:${rk.c};letter-spacing:1px;">${s.l}</div><div class="orb" style="font-size:14px;color:#fff;margin-top:3px;">${s.v}</div><div style="font-size:10px;color:#ffffff33;">${s.s}</div></div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="card-lbl" style="margin-bottom:10px;">SÉANCES — 7 DERNIERS JOURS</div>
    <div style="display:flex;gap:5px;">
      ${Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const k=d.toISOString().split("T")[0];const dn=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"][d.getDay()];const prog=PROGRAM[dn];const ss=S.sessions[k]||{};const done=Object.values(ss).filter(Boolean).length;const isRest=!prog.exercises.length;const pct=isRest?0:prog.exercises.length?done/prog.exercises.length:0;const vol=Object.values(S.sessionLogs[k]||{}).flat().reduce((s,e)=>s+e.weight*(e.reps||1),0);return`<div style="flex:1;text-align:center;"><div style="font-size:8px;color:${rk.c};font-family:'Orbitron',monospace;margin-bottom:2px;">${vol>0?Math.round(toDisp(vol,u)/1000)+"k":""}</div><div style="height:36px;border-radius:6px;background:${isRest?"#ffffff06":pct>=1?`rgba(${prog.craw},.4)`:pct>0?`rgba(${prog.craw},.15)`:"#ffffff08"};border:1px solid ${isRest?"#ffffff0a":pct>=1?prog.color+"66":"#ffffff0a"};display:flex;align-items:center;justify-content:center;font-size:12px;">${isRest?"💤":pct>=1?"✓":pct>0?"~":"✗"}</div><div style="font-size:9px;color:#ffffff33;margin-top:3px;">${["D","L","M","Me","J","V","S"][d.getDay()]}</div></div>`;}).join("")}
    </div>
  </div>
  <div class="card">
    <div class="card-lbl" style="margin-bottom:10px;">PROJECTION</div>
    ${[
      {l:"Rythme conservateur (+0.3kg/sem)",v:`~${wl} sem`},
      {l:"Rythme optimal (+0.45kg/sem)",v:`~${Math.ceil((S.targetWeight-S.currentWeight)/0.45)} sem`},
      {l:"Date estimée",v:(()=>{const d=new Date();d.setDate(d.getDate()+wl*7);return d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});})()},
      {l:"Rang actuel",v:rk.r,c:rk.c},
      {l:"Prochain rang",v:rk.r==="S"?"MAX 👑":["D","C","B","A","S"][["E","D","C","B","A"].indexOf(rk.r)]||"?"},
      {l:"Décharge dans",v:`${DELOAD_EVERY-(weekNum>0?((weekNum-1)%DELOAD_EVERY):DELOAD_EVERY)} sem`},
    ].map(item=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ffffff07;"><span style="color:#ffffff44;font-size:12px;">${item.l}</span><span class="orb" style="font-size:12px;color:${item.c||"#fff"};">${item.v}</span></div>`).join("")}
  </div>
  <div class="card">
    <div class="card-lbl" style="margin-bottom:10px;">RECORDS PERSONNELS 🏆</div>
    ${ALL_EX.map(ex=>{const pr=prSet(ex);const lc=lastSet(ex);if(!pr)return"";const fresh=lc&&lc.date===pr.date;return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:7px;background:#ffffff06;border:1px solid ${fresh?"#ffd70022":"#ffffff0a"};margin-bottom:5px;"><div style="font-size:12px;color:#ffffffbb;">${ex}</div><div class="orb" style="font-size:12px;color:#ffd700;">${toDisp(pr.weight,u)}${uLbl(u)}${pr.reps?`×${pr.reps}`:""} ${fresh?"✨":""}</div></div>`;}).join("")}
  </div>`;

  // ASSEMBLE
  const sections={dashboard:dashHTML,today:seanceHTML,meals:repasHTML,history:histHTML,progress:statsHTML};
  app.innerHTML=headerHTML+tabsHTML+Object.entries(sections).map(([id,html])=>`<div class="section fade${currentTab===id?" active":""}" id="sec-${id}">${html}</div>`).join("");
}

function statCard(label,val,sub,color){
  return `<div class="stat-card"><div class="stat-lbl" style="color:${color};">${label}</div><div class="stat-val">${val}</div><div class="stat-sub">${sub}</div></div>`;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function switchTab(t){currentTab=t;render();}
function setDay(d){currentDay=d;render();}
function toggleUnit(){S.unit=S.unit==="kg"?"lbs":"kg";save();}

function toggleEx(name){
  const dk=tKey();
  if(!S.sessions[dk])S.sessions[dk]={};
  S.sessions[dk][name]=!S.sessions[dk][name];
  save();
}
function toggleMeal(id){
  const dk=tKey();
  if(!S.meals[dk])S.meals[dk]={};
  S.meals[dk][id]=!S.meals[dk][id];
  save();
}
function toggleHistEx(ex){histEx=histEx===ex?null:ex;render();}

function removeLastSet(ex){
  const dk=tKey();
  if(S.sessionLogs[dk]&&S.sessionLogs[dk][ex]){
    S.sessionLogs[dk][ex].pop();
    save();
  }
}

async function toggleNotif(){
  if(!S.notifEnabled){
    const perm=await Notification.requestPermission();
    if(perm==="granted"){S.notifEnabled=true;save();}
    else alert("Active les notifications dans les réglages Safari.");
  } else {S.notifEnabled=false;save();}
}

// ═══════════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════════
function renderModal(){
  const rk=getRank(S.currentWeight,S.targetWeight);
  const u=S.unit;
  const dk=tKey();
  const myTdee=calcTDEE(S.currentWeight,S.heightCm);
  const targetCal=myTdee+400;
  const title=document.getElementById("modal-title");
  const sub=document.getElementById("modal-sub");
  const body=document.getElementById("modal-body");

  if(currentModal==="weight"){
    title.textContent="MISE À JOUR POIDS";
    sub.textContent=`Actuel: ${toDisp(S.currentWeight,u)} ${uLbl(u)} · Saisir en ${uLbl(u)}`;
    body.innerHTML=`<input class="m-input" type="number" id="mi-w" placeholder="${u==="lbs"?"Ex: 128.5":"Ex: 58.5"}" inputmode="decimal"/>
    <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Annuler</button><button class="m-ok" onclick="confirmWeight()">CONFIRMER</button></div>`;
    setTimeout(()=>document.getElementById("mi-w")?.focus(),100);
  }
  else if(currentModal==="cal"){
    title.textContent="CALORIES DU JOUR";
    sub.textContent=`Objectif: ${targetCal} kcal · Actuel: ${S.calorieLog[dk]||0}`;
    body.innerHTML=`<input class="m-input" type="number" id="mi-cal" placeholder="Ex: ${targetCal}" inputmode="numeric"/>
    <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Annuler</button><button class="m-ok" onclick="confirmCal()">CONFIRMER</button></div>`;
    setTimeout(()=>document.getElementById("mi-cal")?.focus(),100);
  }
  else if(currentModal==="measure"){
    title.textContent="MENSURATIONS";
    sub.textContent="En centimètres";
    body.innerHTML=`
    ${[["chest","Poitrine"],["waist","Taille"],["arm","Bras (biceps)"],["thigh","Cuisse"]].map(([k,l])=>`<input class="m-input" type="number" id="mi-${k}" placeholder="${l} cm (actuel: ${S.measurements[k]||"—"})" inputmode="decimal"/>`).join("")}
    <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Annuler</button><button class="m-ok" onclick="confirmMeasure()">CONFIRMER</button></div>`;
  }
  else if(currentModal==="note"){
    const today=todayName();
    title.textContent="NOTE DE SÉANCE";
    sub.textContent=today;
    body.innerHTML=`<textarea class="m-input" id="mi-note" rows="4" style="height:90px;line-height:1.6;" placeholder="Ex: Courbatures dos, bien dormi, PR développé couché...">${S.sessionNotes[dk]||""}</textarea>
    <div class="m-btns"><button class="m-cancel" onclick="closeModal()">Annuler</button><button class="m-ok" onclick="confirmNote()">CONFIRMER</button></div>`;
    setTimeout(()=>document.getElementById("mi-note")?.focus(),100);
  }
  else if(currentModal&&currentModal.startsWith("charge:")){
    const [,exName,repRange,restSecs]=currentModal.split("::");
    const sets=todaySetsFor(exName);
    const lc=lastSet(exName);
    const pr=prSet(exName);
    const next=nextReco(exName,repRange);
    title.textContent=`SÉRIE ${sets.length+1}`;
    sub.textContent=exName;
    let html="";
    if(lc||pr){
      html+=`<div style="display:flex;gap:10px;margin-bottom:12px;padding:8px 11px;border-radius:8px;background:#ffffff08;border:1px solid #ffffff0a;">
        ${lc?`<div style="flex:1;"><div style="font-size:8px;color:#ffffff33;font-family:'Orbitron',monospace;">DERNIÈRE FOIS</div><div class="orb" style="font-size:14px;color:#fff;margin-top:2px;">${toDisp(lc.weight,u)}${uLbl(u)}${lc.reps?`×${lc.reps}`:""}</div></div>`:""}
        ${pr?`<div style="flex:1;border-left:1px solid #ffffff0f;padding-left:10px;"><div style="font-size:8px;color:#ffd70055;font-family:'Orbitron',monospace;">🏆 PR</div><div class="orb" style="font-size:14px;color:#ffd700;margin-top:2px;">${toDisp(pr.weight,u)}${uLbl(u)}${pr.reps?`×${pr.reps}`:""}</div></div>`:""}
      </div>`;
    }
    if(sets.length){
      html+=`<div style="margin-bottom:11px;">
        <div style="font-size:8px;color:#ffffff33;font-family:'Orbitron',monospace;letter-spacing:2px;margin-bottom:5px;">SÉRIES AUJOURD'HUI</div>
        <div>${sets.map((s,i)=>`<span class="set-badge" style="background:rgba(${rk.cr},.1);border:1px solid rgba(${rk.cr},.3);color:${rk.c};">S${i+1} ${toDisp(s.weight,u)}${uLbl(u)}${s.reps?`×${s.reps}`:""}</span>`).join("")}</div>
      </div>`;
    }
    if(next&&sets.length){
      html+=`<div style="margin-bottom:10px;padding:6px 10px;border-radius:6px;background:${next.up?"#00ff8808":"#ffffff06"};border:1px solid ${next.up?"#00ff8822":"#ffffff0a"};display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:10px;color:#ffffff44;">${next.note}</span>
        <span class="orb" style="font-size:11px;color:${next.up?"#00ff88":"#ffffff66"};">→ ${toDisp(next.w,u)}${uLbl(u)}</span>
      </div>`;
    }
    html+=`<div style="display:flex;gap:7px;margin-bottom:7px;">
      <input class="m-input" type="number" id="mi-charge" placeholder="${u==="lbs"?"135 lbs":"60 kg"}" inputmode="decimal" style="flex:2;margin-bottom:0;"/>
      <input class="m-input" type="number" id="mi-reps" placeholder="reps" inputmode="numeric" style="flex:1;margin-bottom:0;"/>
    </div>
    <div class="m-btns">
      <button class="m-cancel" onclick="closeModal()">Terminer</button>
      <button class="m-ok" onclick="confirmCharge('${exName.replace(/'/g,"\\'")}','${repRange}',${restSecs})">✓ S${sets.length+1} + TIMER</button>
    </div>`;
    body.innerHTML=html;
    setTimeout(()=>document.getElementById("mi-charge")?.focus(),100);
  }
}

function openNoteModal(){openModal("note");}
function openChargeModal(ex,reps,rest){currentModal=`charge::${ex}::${reps}::${rest}`;renderModal();document.getElementById("modal-overlay").classList.add("show");}

function confirmWeight(){
  const w=parseFloat(document.getElementById("mi-w")?.value);
  if(isNaN(w)||w<20||w>500)return;
  const wkg=toKg(w,S.unit);
  S.currentWeight=wkg;
  S.weightHistory=[...S.weightHistory,{date:tKey(),weight:wkg}].slice(-90);
  save();closeModal();
}
function confirmCal(){
  const c=parseInt(document.getElementById("mi-cal")?.value);
  if(isNaN(c)||c<=0)return;
  S.calorieLog[tKey()]=c;
  save();closeModal();
}
function confirmMeasure(){
  const entry={date:tKey()};
  ["chest","waist","arm","thigh"].forEach(k=>{const v=parseFloat(document.getElementById(`mi-${k}`)?.value);if(v)entry[k]=v;else if(S.measurements[k])entry[k]=S.measurements[k];});
  S.measurements={...S.measurements,...entry};
  S.measureHistory=[...S.measureHistory,entry].slice(-50);
  save();closeModal();
}
function confirmNote(){
  const n=document.getElementById("mi-note")?.value||"";
  S.sessionNotes[tKey()]=n;
  save();closeModal();
}
function confirmCharge(ex,repRange,rest){
  const c=parseFloat(document.getElementById("mi-charge")?.value);
  const r=parseInt(document.getElementById("mi-reps")?.value);
  if(isNaN(c)||c<=0)return;
  const wkg=toKg(c,S.unit);
  const dk=tKey();
  if(!S.sessionLogs[dk])S.sessionLogs[dk]={};
  if(!S.sessionLogs[dk][ex])S.sessionLogs[dk][ex]=[];
  S.sessionLogs[dk][ex].push({weight:wkg,reps:r||null});
  if(!S.charges[ex])S.charges[ex]=[];
  S.charges[ex]=[...S.charges[ex],{date:dk,weight:wkg,reps:r||null}].slice(-200);
  if(rest>0)startTimer(ex,rest);
  save();
  // Reopen modal for next set
  openChargeModal(ex,repRange,rest);
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════
function initParticles(){
  const container=document.getElementById("particles");
  for(let i=0;i<22;i++){
    const el=document.createElement("div");
    el.className="pt";
    el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2.5+1}px;height:${Math.random()*2.5+1}px;animation:fp ${Math.random()*18+8}s ${Math.random()*4}s infinite alternate ease-in-out;`;
    container.appendChild(el);
  }
}

function updateParticleColor(){
  const rk=getRank(S.currentWeight,S.targetWeight);
  document.querySelectorAll(".pt").forEach(el=>el.style.background=rk.c);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
initParticles();
render();
setInterval(updateParticleColor,2000);

// Notification reminders
function scheduleNotifs(){
  if(!S.notifEnabled||Notification.permission!=="granted")return;
  const now=new Date();
  MEALS.forEach(m=>{
    const t=new Date();t.setHours(m.hour,0,0,0);
    const diff=t-now;
    if(diff>0)setTimeout(()=>{
      const meals=S.meals[tKey()]||{};
      if(!meals[m.id])new Notification(`🍽 Heure du ${m.label}`,{body:`${m.kcal} kcal — n'oublie pas !`});
    },diff);
  });
  const seance=new Date();seance.setHours(7,30,0,0);
  const sdiff=seance-now;
  const dn=todayName();
  if(sdiff>0&&PROGRAM[dn].exercises.length>0)
    setTimeout(()=>new Notification(`⚔️ Séance: ${PROGRAM[dn].label}`,{body:"Hunter Protocol activé 💪"}),sdiff);
}
scheduleNotifs();
</script>
